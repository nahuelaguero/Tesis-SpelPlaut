<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <title>SpelPlaut sin conexión</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #eff6ff;
        color: #111827;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      section {
        max-width: 420px;
        border: 1px solid #bfdbfe;
        border-radius: 24px;
        background: #ffffff;
        padding: 32px;
        box-shadow: 0 20px 50px rgba(37, 99, 235, 0.14);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0 0 20px;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        border-radius: 12px;
        background: #2563eb;
        color: #ffffff;
        padding: 12px 18px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Sin conexión</h1>
        <p>
          SpelPlaut está en modo offline. Podés volver a la pantalla principal
          cuando la conexión regrese.
        </p>
        <a href="/">Volver al inicio</a>
      </section>
    </main>
  </body>
</html>
